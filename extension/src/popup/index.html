<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Right Choice</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        background: #fff;
        color: #111827;
        width: 280px;
        min-height: 200px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px 12px;
        border-bottom: 1px solid #f3f4f6;
      }
      header h1 { font-size: 13px; font-weight: 700; color: #16a34a; }

      section { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; }
      section:last-child { border-bottom: none; }

      .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; margin-bottom: 8px; }

      #page-status { min-height: 40px; }
      .muted { color: #9ca3af; font-size: 12px; }

      .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
      .co2 { font-size: 18px; font-weight: 800; color: #111827; }
      .alts { font-size: 11px; color: #6b7280; }

      .badge {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 99px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .verified { background: #dcfce7; color: #166534; }
      .estimated { background: #fef9c3; color: #854d0e; }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .toggle-row:last-child { margin-bottom: 0; }

      .toggle-label { font-size: 12px; color: #374151; }
      .toggle-desc { font-size: 10px; color: #9ca3af; margin-top: 1px; }

      input[type="checkbox"] { accent-color: #16a34a; width: 16px; height: 16px; cursor: pointer; }

      footer { padding: 8px 16px; text-align: center; }
      footer a { font-size: 10px; color: #9ca3af; text-decoration: none; }
      footer a:hover { color: #6b7280; }
    </style>
  </head>
  <body>
    <header>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#16a34a" stroke-width="2"/>
        <path d="M8 12c0-2.2 1.8-4 4-4s4 1.8 4 4-1.8 4-4 4" stroke="#16a34a" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="2" fill="#16a34a"/>
      </svg>
      <h1>Right Choice</h1>
    </header>

    <section>
      <div class="section-title">This page</div>
      <div id="page-status"><p class="muted">Scanning…</p></div>
    </section>

    <section>
      <div class="section-title">Settings</div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Show banner</div>
          <div class="toggle-desc">Display CO₂e score on product pages</div>
        </div>
        <input type="checkbox" id="toggle-banner" checked />
      </div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Share anonymous data</div>
          <div class="toggle-desc">Help improve category estimates</div>
        </div>
        <input type="checkbox" id="toggle-sharing" checked />
      </div>
    </section>

    <footer>
      <a href="https://rightchoice.c22.space" target="_blank" rel="noopener">rightchoice.c22.space</a>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
