<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Right Choice</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        background: #fff;
        color: #111827;
        width: 280px;
        min-height: 160px;
        overflow: hidden;
      }

      /* ── Views ── */
      .view { display: none; flex-direction: column; }
      .view.active { display: flex; }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px 11px;
        border-bottom: 1px solid #f3f4f6;
      }
      header h1 { font-size: 13px; font-weight: 700; color: #16a34a; flex: 1; }

      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: #9ca3af;
        padding: 2px;
        line-height: 1;
        display: flex;
        align-items: center;
        border-radius: 4px;
      }
      .icon-btn:hover { color: #374151; background: #f3f4f6; }

      /* ── Main view ── */
      #main-view section { padding: 12px 14px; }

      .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; margin-bottom: 8px; }

      #page-status { min-height: 36px; }
      .muted { color: #9ca3af; font-size: 12px; }

      .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
      .co2 { font-size: 18px; font-weight: 800; color: #111827; }
      .alts { font-size: 11px; color: #6b7280; }

      .badge {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 99px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .verified { background: #dcfce7; color: #166534; }
      .estimated { background: #fef9c3; color: #854d0e; }

      footer { padding: 8px 14px; border-top: 1px solid #f3f4f6; }
      footer a { font-size: 10px; color: #9ca3af; text-decoration: none; }
      footer a:hover { color: #6b7280; }

      /* ── Settings view ── */
      #settings-view header { gap: 6px; }

      .back-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: #9ca3af;
        font-size: 16px;
        padding: 2px 4px;
        line-height: 1;
        border-radius: 4px;
      }
      .back-btn:hover { color: #374151; background: #f3f4f6; }

      #settings-view section { padding: 12px 14px; border-bottom: 1px solid #f3f4f6; }
      #settings-view section:last-child { border-bottom: none; }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .toggle-row:last-child { margin-bottom: 0; }

      .toggle-label { font-size: 12px; font-weight: 500; color: #374151; }
      .toggle-desc { font-size: 10px; color: #9ca3af; margin-top: 2px; }

      input[type="checkbox"] { accent-color: #16a34a; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    </style>
  </head>
  <body>

    <!-- Main view -->
    <div id="main-view" class="view active">
      <header>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#16a34a" stroke-width="2"/>
          <path d="M8 12c0-2.2 1.8-4 4-4s4 1.8 4 4-1.8 4-4 4" stroke="#16a34a" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="2" fill="#16a34a"/>
        </svg>
        <h1>Right Choice</h1>
        <button class="icon-btn" id="open-settings" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </header>

      <section>
        <div class="section-title">This page</div>
        <div id="page-status"><p class="muted">Scanning…</p></div>
      </section>

      <footer>
        <a href="https://rightchoice.c22.space" target="_blank" rel="noopener">rightchoice.c22.space</a>
      </footer>
    </div>

    <!-- Settings view -->
    <div id="settings-view" class="view">
      <header>
        <button class="back-btn" id="close-settings" title="Back">←</button>
        <h1>Settings</h1>
      </header>

      <section>
        <div class="toggle-row">
          <div>
            <div class="toggle-label">Show banner</div>
            <div class="toggle-desc">Display CO₂e score on product pages</div>
          </div>
          <input type="checkbox" id="toggle-banner" checked />
        </div>
        <div class="toggle-row">
          <div>
            <div class="toggle-label">Share anonymous data</div>
            <div class="toggle-desc">Help improve category estimates</div>
          </div>
          <input type="checkbox" id="toggle-sharing" checked />
        </div>
      </section>
      <section>
        <div class="section-title" style="margin-bottom:8px">API key</div>
        <input
          type="password"
          id="api-key-input"
          placeholder="Paste your API key"
          style="width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:5px 8px;font-size:12px;font-family:monospace;color:#111827;background:#f9fafb;box-sizing:border-box"
        />
        <button id="save-api-key" style="margin-top:6px;width:100%;padding:5px;border:none;border-radius:6px;background:#16a34a;color:#fff;font-size:11px;font-weight:600;cursor:pointer">Save</button>
        <p id="api-key-status" style="margin-top:4px;font-size:10px;color:#9ca3af;display:none"></p>
      </section>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
